<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حرب الأبراج - Tower Defense HD Pro</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --panel-bg: rgba(15, 23, 42, 0.9);
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --accent-red: #f43f5e;
            --accent-purple: #c084fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
            display: flex;
            flex-direction: column;
        }

        /* شريط المعلومات العلوي */
        .header-ui {
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .stat-badge {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 800;
            color: #f8fafc;
        }

        #game-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e1b4b 0%, #090d16 100%);
        }

        canvas {
            display: block;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
        }

        /* شريط الأبراج السفلي */
        .footer-ui {
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .tower-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 2px solid #334155;
            border-radius: 14px;
            padding: 8px 12px;
            min-width: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tower-card.selected {
            border-color: var(--accent-blue);
            background: linear-gradient(145deg, #0284c7, #0369a1);
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.4);
        }

        .tower-icon { font-size: 22px; }
        .tower-name { font-size: 11px; font-weight: 700; color: #f8fafc; }
        .tower-cost {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 100;
        }

        .modal-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            width: 85%;
            max-width: 320px;
        }

        .btn-action {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header-ui">
        <div class="stat-badge">💰 <span id="goldText" style="color:var(--accent-gold)">150</span></div>
        <div class="stat-badge">❤️ <span id="hpText" style="color:var(--accent-red)">10</span></div>
        <div class="stat-badge">🌊 <span id="waveText" style="color:var(--accent-blue)">1</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="footer-ui">
        <div class="tower-card selected" onclick="selectTower('archer')" id="btn-archer">
            <span class="tower-icon">🏹</span>
            <span class="tower-name">سريع</span>
            <span class="tower-cost">50 💰</span>
        </div>
        <div class="tower-card" onclick="selectTower('cannon')" id="btn-cannon">
            <span class="tower-icon">💣</span>
            <span class="tower-name">مدفع</span>
            <span class="tower-cost">100 💰</span>
        </div>
        <div class="tower-card" onclick="selectTower('slow')" id="btn-slow">
            <span class="tower-icon">❄️</span>
            <span class="tower-name">إبطاء</span>
            <span class="tower-cost">85 💰</span>
        </div>
    </div>

    <div id="gameOverBox" class="modal">
        <div class="modal-card">
            <h1 style="color:var(--accent-red)">سقطت القلعة! 💥</h1>
            <p style="color: #94a3b8; font-size: 15px;">وصلت إلى الموجة: <b id="finalWave" style="color:var(--accent-blue)">1</b></p>
            <button class="btn-action" onclick="restartGame()">إعادة اللعب 🔄</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const goldText = document.getElementById('goldText');
        const hpText = document.getElementById('hpText');
        const waveText = document.getElementById('waveText');
        const gameOverBox = document.getElementById('gameOverBox');
        const finalWave = document.getElementById('finalWave');

        let gold = 150;
        let health = 10;
        let wave = 1;
        let isGameOver = false;
        let selectedTowerType = 'archer';

        const cols = 8;
        const rows = 10;
        let cellSize = 40;

        let path = [];
        const towers = [];
        const enemies = [];
        const bullets = [];
        const particles = [];
        const floatingTexts = []; // نصوص الذهب المتطايرة عند الربح

        const towerSpecs = {
            archer: { icon: '🏹', cost: 50, range: 2.3, damage: 18, rate: 18, color: '#38bdf8' },
            cannon: { icon: '💣', cost: 100, range: 2.0, damage: 50, rate: 45, color: '#f97316' },
            slow: { icon: '❄️', cost: 85, range: 2.2, damage: 4, rate: 15, color: '#c084fc', slows: true }
        };

        function resizeCanvas() {
            const container = document.getElementById('game-container');
            const availableW = container.clientWidth - 20;
            const availableH = container.clientHeight - 20;

            cellSize = Math.floor(Math.min(availableW / cols, availableH / rows));
            canvas.width = cols * cellSize;
            canvas.height = rows * cellSize;

            path = [
                { x: 0.5 * cellSize, y: 0.5 * cellSize },
                { x: 6.5 * cellSize, y: 0.5 * cellSize },
                { x: 6.5 * cellSize, y: 3.5 * cellSize },
                { x: 1.5 * cellSize, y: 3.5 * cellSize },
                { x: 1.5 * cellSize, y: 6.5 * cellSize },
                { x: 6.5 * cellSize, y: 6.5 * cellSize },
                { x: 6.5 * cellSize, y: 9.5 * cellSize }
            ];
        }

        function selectTower(type) {
            selectedTowerType = type;
            document.querySelectorAll('.tower-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`btn-${type}`).classList.add('selected');
        }

        function handleTouch(clientX, clientY) {
            if (isGameOver) return;
            const rect = canvas.getBoundingClientRect();
            const col = Math.floor((clientX - rect.left) / cellSize);
            const row = Math.floor((clientY - rect.top) / cellSize);

            if (col < 0 || col >= cols || row < 0 || row >= rows) return;

            const isOnPath = path.some((p, i) => {
                if (i === path.length - 1) return false;
                const p2 = path[i + 1];
                const minX = Math.min(p.x, p2.x) - cellSize/2;
                const maxX = Math.max(p.x, p2.x) + cellSize/2;
                const minY = Math.min(p.y, p2.y) - cellSize/2;
                const maxY = Math.max(p.y, p2.y) + cellSize/2;
                const cx = col * cellSize + cellSize/2;
                const cy = row * cellSize + cellSize/2;
                return cx >= minX && cx <= maxX && cy >= minY && cy <= maxY;
            });

            const hasTower = towers.some(t => t.col === col && t.row === row);
            const spec = towerSpecs[selectedTowerType];

            if (!isOnPath && !hasTower && gold >= spec.cost) {
                gold -= spec.cost;
                goldText.innerText = gold;
                towers.push({
                    col, row,
                    x: col * cellSize + cellSize/2,
                    y: row * cellSize + cellSize/2,
                    spec, cooldown: 0
                });
                createExplosion(col * cellSize + cellSize/2, row * cellSize + cellSize/2, spec.color, 10);
            }
        }

        canvas.addEventListener('click', e => handleTouch(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length > 0) handleTouch(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        function createExplosion(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: 2 + Math.random() * 3,
                    color, alpha: 1
                });
            }
        }

        // إنشاء نص الذهب المضيء عند الربح
        function addFloatingText(x, y, text) {
            floatingTexts.push({ x, y, text, alpha: 1, vy: -1.5 });
        }

        function spawnWave() {
            if (isGameOver) return;
            let count = 4 + wave * 2;
            let spawned = 0;

            const timer = setInterval(() => {
                if (isGameOver || spawned >= count) {
                    clearInterval(timer);
                    return;
                }
                enemies.push({
                    x: path[0].x, y: path[0].y,
                    pathIndex: 0,
                    hp: 40 + wave * 25,
                    maxHp: 40 + wave * 25,
                    speed: 1.2 + Math.random() * 0.3,
                    currentSpeed: 1.2,
                    radius: cellSize * 0.26,
                    reward: 15 + wave * 2, // قيمة الذهب عند القتل
                    rotation: 0
                });
                spawned++;
            }, 900);
        }

        function restartGame() {
            gold = 150; health = 10; wave = 1; isGameOver = false;
            towers.length = 0; enemies.length = 0; bullets.length = 0; particles.length = 0; floatingTexts.length = 0;
            goldText.innerText = gold; hpText.innerText = health; waveText.innerText = wave;
            gameOverBox.style.display = 'none';
            spawnWave();
            animate();
        }

        // رسم العدو الاحترافي (وحش نيون ذو شفرات وأعين)
        function drawEnemy(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.rotation);

            // الشفرات الخارجية
            ctx.beginPath();
            for (let i = 0; i < 4; i++) {
                ctx.rotate(Math.PI / 2);
                ctx.rect(-e.radius * 0.8, -e.radius * 0.8, e.radius * 1.6, e.radius * 1.6);
            }
            ctx.fillStyle = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ef4444';
            ctx.fill();

            // اللب الداخلي
            ctx.beginPath();
            ctx.arc(0, 0, e.radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#0f172a';
            ctx.fill();

            // العين المضيئة
            ctx.beginPath();
            ctx.arc(0, 0, e.radius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = '#f59e0b';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#f59e0b';
            ctx.fill();

            ctx.restore();

            // شريط الصحة
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(e.x - 12, e.y - e.radius - 8, 24, 4);
            ctx.fillStyle = '#10b981';
            ctx.fillRect(e.x - 12, e.y - e.radius - 8, (e.hp / e.maxHp) * 24, 4);
        }

        function animate() {
            if (isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. الشبكة
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(30, 41, 59, 0.3)' : 'rgba(15, 23, 42, 0.3)';
                    ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                }
            }

            // 2. المسار النيون
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = cellSize * 0.6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            ctx.strokeStyle = 'rgba(56, 189, 248, 0.2)';
            ctx.lineWidth = cellSize * 0.2;
            ctx.stroke();

            // 3. الأعداء
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const target = path[e.pathIndex + 1];

                if (target) {
                    const dx = target.x - e.x, dy = target.y - e.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < e.currentSpeed) e.pathIndex++;
                    else {
                        e.x += (dx / dist) * e.currentSpeed;
                        e.y += (dy / dist) * e.currentSpeed;
                    }
                } else {
                    health--;
                    hpText.innerText = health;
                    enemies.splice(i, 1);
                    if (health <= 0) {
                        isGameOver = true;
                        finalWave.innerText = wave;
                        gameOverBox.style.display = 'flex';
                        return;
                    }
                    continue;
                }

                e.currentSpeed = e.speed;
                e.rotation += 0.05; // دوران الشفرات

                drawEnemy(e);
            }

            // 4. الأبراج
            for (let t of towers) {
                ctx.beginPath();
                ctx.arc(t.x, t.y, cellSize * 0.38, 0, Math.PI * 2);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
                ctx.strokeStyle = t.spec.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.font = `${cellSize * 0.4}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(t.spec.icon, t.x, t.y);

                if (t.cooldown > 0) { t.cooldown--; continue; }

                let target = null, minDist = Infinity;
                for (let e of enemies) {
                    const d = Math.hypot(e.x - t.x, e.y - t.y);
                    if (d < t.spec.range * cellSize && d < minDist) {
                        minDist = d; target = e;
                    }
                }

                if (target) {
                    bullets.push({
                        x: t.x, y: t.y, target,
                        damage: t.spec.damage,
                        slows: t.spec.slows || false,
                        color: t.spec.color
                    });
                    t.cooldown = t.spec.rate;
                }
            }

            // 5. الرصاص والربح عند القتل
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                if (!enemies.includes(b.target)) { bullets.splice(i, 1); continue; }

                const dx = b.target.x - b.x, dy = b.target.y - b.y;
                const dist = Math.hypot(dx, dy);

                if (dist < 10) {
                    b.target.hp -= b.damage;
                    createExplosion(b.x, b.y, b.color, 4);
                    if (b.slows) b.target.currentSpeed = b.target.speed * 0.45;

                    // القضاء على العدو وحساب الذهب 💰
                    if (b.target.hp <= 0) {
                        const idx = enemies.indexOf(b.target);
                        if (idx > -1) {
                            const earnedGold = enemies[idx].reward;
                            gold += earnedGold;
                            goldText.innerText = gold; // تحديث رصيد الذهب في الأعلى
                            
                            // إضافة تأثير الذهب المتطاير تأكيداً للربح
                            addFloatingText(b.target.x, b.target.y, `+${earnedGold} 💰`);
                            createExplosion(b.target.x, b.target.y, '#fbbf24', 12);
                            
                            enemies.splice(idx, 1);
                        }
                    }
                    bullets.splice(i, 1);
                } else {
                    b.x += (dx / dist) * 9;
                    b.y += (dy / dist) * 9;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = b.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = b.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // 6. تأثيرات الانفجارات
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.alpha);
                ctx.fill();
                ctx.globalAlpha = 1;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            // 7. رسم نصوص الذهب المتطايرة (+15💰)
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.y += ft.vy;
                ft.alpha -= 0.02;

                ctx.font = 'bold 14px system-ui';
                ctx.fillStyle = '#fbbf24';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#fbbf24';
                ctx.globalAlpha = Math.max(0, ft.alpha);
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
            }

            // نهاية الموجة والمكافأة (Wave Clearance Bonus) 🎁
            if (enemies.length === 0) {
                gold += 50; // إعطاء 50 ذهبة مكافأة إنهاء الموجة
                goldText.innerText = gold;
                addFloatingText(canvas.width / 2, canvas.height / 2, '+50 💰 مكافأة الموجة!');

                wave++;
                waveText.innerText = wave;
                spawnWave();
            }

            requestAnimationFrame(animate);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        spawnWave();
        animate();
    </script>
</body>
</html>
