<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة ملاحقة الحنش للماوس مع الأكل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #gameCanvas {
            display: block;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #f8fafc;
            font-size: 18px;
            pointer-events: none;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .score-board {
            background: rgba(15, 23, 42, 0.7);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            font-weight: bold;
            color: #38bdf8;
            width: fit-content;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div>حرّك الماوس ليأكل الحنش النقاط ويكبر! 🐍</div>
        <div class="score-board">النقاط: <span id="scoreText">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');

        let score = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const mouse = {
            x: canvas.width / 2,
            y: canvas.height / 2
        };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // إعدادات الحنش
        let snakeLength = 20; // الطول الابتدائي
        const segmentRadius = 12;
        const speed = 0.15;

        const snake = [];
        for (let i = 0; i < snakeLength; i++) {
            snake.push({ x: canvas.width / 2, y: canvas.height / 2 });
        }

        // إعدادات الطعام (النقطة)
        const food = {
            x: 0,
            y: 0,
            radius: 8,
            color: '#f43f5e'
        };

        // دالة توليد طعام في مكان عشوائي
        function spawnFood() {
            const margin = 50;
            food.x = margin + Math.random() * (canvas.width - margin * 2);
            food.y = margin + Math.random() * (canvas.height - margin * 2);
        }
        spawnFood(); // إنشاء أول نقطة

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. تحريك رأس الحنش باتجاه الماوس
            const head = snake[0];
            head.x += (mouse.x - head.x) * speed;
            head.y += (mouse.y - head.y) * speed;

            // 2. تحريك بقية أجزاء الجسم
            for (let i = 1; i < snake.length; i++) {
                const prev = snake[i - 1];
                const current = snake[i];

                current.x += (prev.x - current.x) * 0.45;
                current.y += (prev.y - current.y) * 0.45;
            }

            // 3. فحص الاصطدام بالطعام (الأكل)
            const distToFood = Math.hypot(head.x - food.x, head.y - food.y);
            if (distToFood < segmentRadius + food.radius) {
                // زيادة السكور
                score += 10;
                scoreText.innerText = score;

                // زيادة طول الحنش بإضافة حلقات جديدة في ذيله
                const tail = snake[snake.length - 1];
                for (let i = 0; i < 4; i++) { // يضيف 4 حلقات لكل نقطة
                    snake.push({ x: tail.x, y: tail.y });
                }

                // إنشاء نقطة طعام جديدة
                spawnFood();
            }

            // 4. رسم الطعام (نقطة مضيئة)
            ctx.beginPath();
            ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
            ctx.fillStyle = food.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = food.color;
            ctx.fill();
            ctx.closePath();

            // 5. رسم الحنش
            for (let i = snake.length - 1; i >= 0; i--) {
                const segment = snake[i];
                
                ctx.beginPath();
                const radius = segmentRadius * (1 - (i / snake.length) * 0.4);
                ctx.arc(segment.x, segment.y, Math.max(radius, 3), 0, Math.PI * 2);

                if (i === 0) {
                    ctx.fillStyle = '#10b981';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#10b981';
                } else {
                    ctx.fillStyle = `hsl(${140 + i * 1.5}, 70%, ${50 - (i / snake.length) * 20}%)`;
                    ctx.shadowBlur = 0;
                }

                ctx.fill();
                ctx.closePath();
            }

            // رسم العيون
            drawEyes(snake[0]);

            requestAnimationFrame(animate);
        }

        function drawEyes(head) {
            const angle = Math.atan2(mouse.y - head.y, mouse.x - head.x);
            const eyeOffset = 6;
            const eyeRadius = 3;

            for (let side of [-1, 1]) {
                const eyeX = head.x + Math.cos(angle + (side * Math.PI / 4)) * eyeOffset;
                const eyeY = head.y + Math.sin(angle + (side * Math.PI / 4)) * eyeOffset;

                ctx.beginPath();
                ctx.arc(eyeX, eyeY, eyeRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 0;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(eyeX, eyeY, eyeRadius / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#000000';
                ctx.fill();
            }
        }

        animate();
    </script>
</body>
</html>
