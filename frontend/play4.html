<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معركة الفضاء - HD Edition</title>
    <style>
        :root {
            --panel-bg: rgba(15, 23, 42, 0.85);
            --accent-blue: #38bdf8;
            --accent-purple: #c084fc;
            --accent-red: #f43f5e;
            --accent-gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030712;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
            display: flex;
            flex-direction: column;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #020617;
        }

        .ui-header {
            position: absolute;
            top: 15px;
            right: 15px;
            left: 15px;
            color: #f8fafc;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
        }

        .stat-badge {
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        .boss-hp-container {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 380px;
            height: 16px;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid var(--accent-red);
            border-radius: 10px;
            overflow: hidden;
            display: none;
            z-index: 5;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.5);
        }

        .boss-hp-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f43f5e, #fbbf24);
            transition: width 0.1s linear;
        }

        .modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            color: #f8fafc;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            width: 85%;
            max-width: 320px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>
<body>

    <div class="ui-header">
        <div class="stat-badge">💰 النقاط: <span id="scoreText" style="color:var(--accent-gold)">0</span></div>
        <div class="stat-badge">⚡ المستوى: <span id="levelText" style="color:var(--accent-blue)">1 (ليزر عادي)</span></div>
    </div>

    <div id="bossHpBox" class="boss-hp-container">
        <div id="bossHpBar" class="boss-hp-bar"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="gameOverBox" class="modal">
        <div class="modal-card">
            <h1 style="color: var(--accent-red); margin-bottom: 8px;">تدمّرت سفينتك! 💥</h1>
            <p style="color: #94a3b8;">النقاط التي جمعتها: <b id="finalScore" style="color: var(--accent-gold);">0</b></p>
            <button class="btn-restart" onclick="restartGame()">إعادة المحاولة 🔄</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreText = document.getElementById('scoreText');
        const levelText = document.getElementById('levelText');
        const gameOverBox = document.getElementById('gameOverBox');
        const finalScore = document.getElementById('finalScore');
        const bossHpBox = document.getElementById('bossHpBox');
        const bossHpBar = document.getElementById('bossHpBar');

        let score = 0;
        let isGameOver = false;
        let lastShotTime = 0;
        let weaponLevel = 1;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            radius: 20
        };

        function updatePlayerPos(x, y) {
            if (!isGameOver) {
                player.x = x;
                player.y = y;
            }
        }

        window.addEventListener('mousemove', e => updatePlayerPos(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => {
            if (e.touches.length > 0) updatePlayerPos(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        // خلفية النجوم المتحركة
        const stars = [];
        for (let i = 0; i < 70; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 3 + 1
            });
        }

        const bullets = [];
        const enemyBullets = [];
        const enemies = [];
        const particles = [];
        const floatingTexts = [];
        let boss = null;

        // تحديث مستوى السلاح تلقائياً بناءً على النقاط
        function updateWeaponLevel() {
            if (score < 100) {
                weaponLevel = 1;
                levelText.innerText = "1 (ليزر بسيط)";
                levelText.style.color = "#38bdf8";
            } else if (score < 250) {
                weaponLevel = 2;
                levelText.innerText = "2 (مدفع ثنائي)";
                levelText.style.color = "#fbbf24";
            } else if (score < 500) {
                weaponLevel = 3;
                levelText.innerText = "3 (بلازما ثلاثية)";
                levelText.style.color = "#c084fc";
            } else {
                weaponLevel = 4;
                levelText.innerText = "4 (السلاح الفائق 🚀)";
                levelText.style.color = "#f43f5e";
            }
        }

        // إطلاق الأسلحة بناءً على المستوى الحالي
        function shoot() {
            const now = Date.now();
            const rate = weaponLevel === 1 ? 140 : weaponLevel === 2 ? 120 : weaponLevel === 3 ? 100 : 80;
            if (now - lastShotTime < rate) return;
            lastShotTime = now;

            if (weaponLevel === 1) {
                bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -15, radius: 4, damage: 1, color: '#38bdf8' });
            } else if (weaponLevel === 2) {
                bullets.push({ x: player.x - 10, y: player.y - 15, vx: 0, vy: -15, radius: 5, damage: 1, color: '#fbbf24' });
                bullets.push({ x: player.x + 10, y: player.y - 15, vx: 0, vy: -15, radius: 5, damage: 1, color: '#fbbf24' });
            } else if (weaponLevel === 3) {
                bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -15, radius: 6, damage: 1.5, color: '#c084fc' });
                bullets.push({ x: player.x - 12, y: player.y - 10, vx: -3, vy: -14, radius: 5, damage: 1.2, color: '#c084fc' });
                bullets.push({ x: player.x + 12, y: player.y - 10, vx: 3, vy: -14, radius: 5, damage: 1.2, color: '#c084fc' });
            } else {
                // المستوى الفائق
                bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -18, radius: 8, damage: 2, color: '#f43f5e' });
                bullets.push({ x: player.x - 15, y: player.y - 10, vx: -4, vy: -15, radius: 5, damage: 1.5, color: '#38bdf8' });
                bullets.push({ x: player.x + 15, y: player.y - 10, vx: 4, vy: -15, radius: 5, damage: 1.5, color: '#38bdf8' });
            }
        }

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    radius: 2 + Math.random() * 4,
                    color, alpha: 1
                });
            }
        }

        function addFloatingText(x, y, text) {
            floatingTexts.push({ x, y, text, alpha: 1, vy: -1.5 });
        }

        function spawnEnemy() {
            if (boss) return;
            const radius = 15 + Math.random() * 15;
            enemies.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: -radius,
                radius: radius,
                vx: (Math.random() - 0.5) * 2.5,
                vy: 2 + Math.random() * 2.5,
                hp: Math.floor(radius / 6),
                color: '#ef4444'
            });
        }

        function spawnBoss() {
            bossHpBox.style.display = 'block';
            boss = {
                x: canvas.width / 2,
                y: -100,
                targetY: 120,
                radius: 50,
                maxHp: 200,
                hp: 200,
                vx: 3.5,
                color: '#a855f7',
                lastAttackTime: Date.now()
            };
        }

        function bossAttack() {
            if (!boss || boss.y < boss.targetY) return;
            const now = Date.now();
            if (now - boss.lastAttackTime < 1000) return;
            boss.lastAttackTime = now;

            // إطلاق طلقات دائرية متوهجة
            for (let i = 0; i < 10; i++) {
                const angle = (Math.PI * 2 / 10) * i;
                enemyBullets.push({
                    x: boss.x, y: boss.y,
                    vx: Math.cos(angle) * 4.5,
                    vy: Math.sin(angle) * 4.5,
                    color: '#f43f5e'
                });
            }
        }

        function restartGame() {
            score = 0;
            scoreText.innerText = score;
            updateWeaponLevel();
            isGameOver = false;
            bullets.length = 0;
            enemyBullets.length = 0;
            enemies.length = 0;
            particles.length = 0;
            floatingTexts.length = 0;
            boss = null;
            bossHpBox.style.display = 'none';
            gameOverBox.style.display = 'none';
            animate();
        }

        function animate() {
            if (isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. رسم وتحديث النجوم في الخلفية
            ctx.fillStyle = '#ffffff';
            for (let s of stars) {
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            }

            shoot();

            // 2. طلقات اللاعب
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx; b.y += b.vy;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = b.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                if (b.y < -20 || b.x < -20 || b.x > canvas.width + 20) bullets.splice(i, 1);
            }

            // 3. طلقات الأعداء والوحش
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                eb.x += eb.vx; eb.y += eb.vy;

                ctx.beginPath();
                ctx.arc(eb.x, eb.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = eb.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = eb.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                if (Math.hypot(player.x - eb.x, player.y - eb.y) < player.radius + 6) {
                    createExplosion(player.x, player.y, '#f43f5e', 35);
                    isGameOver = true;
                    finalScore.innerText = score;
                    gameOverBox.style.display = 'flex';
                    return;
                }

                if (eb.y > canvas.height + 20) enemyBullets.splice(i, 1);
            }

            // 4. الوحش الرئيسي (Boss)
            if (boss) {
                if (boss.y < boss.targetY) boss.y += 2;
                else {
                    boss.x += boss.vx;
                    if (boss.x < boss.radius + 20 || boss.x > canvas.width - boss.radius - 20) boss.vx *= -1;
                    bossAttack();
                }

                ctx.beginPath();
                ctx.arc(boss.x, boss.y, boss.radius, 0, Math.PI * 2);
                ctx.fillStyle = boss.color;
                ctx.shadowBlur = 25;
                ctx.shadowColor = boss.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.radius) {
                        boss.hp -= b.damage;
                        bossHpBar.style.width = `${(boss.hp / boss.maxHp) * 100}%`;
                        createExplosion(b.x, b.y, '#a855f7', 4);
                        bullets.splice(j, 1);

                        if (boss.hp <= 0) {
                            createExplosion(boss.x, boss.y, '#a855f7', 60);
                            score += 250;
                            scoreText.innerText = score;
                            updateWeaponLevel();
                            boss = null;
                            bossHpBox.style.display = 'none';
                            break;
                        }
                    }
                }
            }

            // 5. الأعداء العاديين
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx; e.y += e.vy;

                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = e.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius) {
                        e.hp -= b.damage;
                        bullets.splice(j, 1);

                        if (e.hp <= 0) {
                            createExplosion(e.x, e.y, e.color, 15);
                            score += 15;
                            scoreText.innerText = score;
                            addFloatingText(e.x, e.y, '+15');
                            updateWeaponLevel();

                            if (score > 0 && score % 200 === 0 && !boss) {
                                spawnBoss();
                            }

                            enemies.splice(i, 1);
                            break;
                        }
                    }
                }

                if (enemies[i] && Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.radius) {
                    createExplosion(player.x, player.y, '#f43f5e', 35);
                    isGameOver = true;
                    finalScore.innerText = score;
                    gameOverBox.style.display = 'flex';
                    return;
                }

                if (e.y > canvas.height + 50) enemies.splice(i, 1);
            }

            // 6. تأثير الجسيمات
            for (let i = particles.length - 1; i >= 0; i--) {
                const pt = particles[i];
                pt.x += pt.vx; pt.y += pt.vy;
                pt.alpha -= 0.04;

                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2);
                ctx.fillStyle = pt.color;
                ctx.globalAlpha = Math.max(0, pt.alpha);
                ctx.fill();
                ctx.globalAlpha = 1;

                if (pt.alpha <= 0) particles.splice(i, 1);
            }

            // 7. النصوص المتطايرة عند الربح
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.y += ft.vy; ft.alpha -= 0.03;

                ctx.font = 'bold 15px system-ui';
                ctx.fillStyle = '#fbbf24';
                ctx.globalAlpha = Math.max(0, ft.alpha);
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1;

                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
            }

            // 8. رسم سفينة اللاعب النيون الاحترافية
            ctx.save();
            ctx.translate(player.x, player.y);

            // محرك النار الخلفي
            ctx.beginPath();
            ctx.moveTo(-6, player.radius);
            ctx.lineTo(0, player.radius + 12 + Math.random() * 6);
            ctx.lineTo(6, player.radius);
            ctx.fillStyle = '#fbbf24';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fbbf24';
            ctx.fill();

            // جسم السفينة
            ctx.beginPath();
            ctx.moveTo(0, -player.radius);
            ctx.lineTo(-player.radius, player.radius);
            ctx.lineTo(0, player.radius - 6);
            ctx.lineTo(player.radius, player.radius);
            ctx.closePath();
            ctx.fillStyle = '#38bdf8';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#38bdf8';
            ctx.fill();
            ctx.restore();

            requestAnimationFrame(animate);
        }

        setInterval(() => {
            if (!isGameOver) spawnEnemy();
        }, 500);

        animate();
    </script>
</body>
</html>
