<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تقطيع الفواكه - النسخة المتقدمة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            cursor: none; /* إخفاء مؤشر الماوس العادي */
        }

        #gameCanvas {
            display: block;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #f8fafc;
            font-size: 18px;
            pointer-events: none;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .score-board {
            background: rgba(15, 23, 42, 0.85);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            font-weight: bold;
            color: #fbbf24;
            width: fit-content;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div>حرّك السكين بسرعة لتقطيع الفواكه! ⚔️</div>
        <div class="score-board">النقاط: <span id="scoreText">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');

        let score = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // بيانات الماوس والسكين
        const mouse = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            prevX: canvas.width / 2,
            prevY: canvas.height / 2,
            angle: 0,
            speed: 0,
            trail: []
        };

        window.addEventListener('mousemove', (e) => {
            mouse.prevX = mouse.x;
            mouse.prevY = mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            // حساب زاوية وسرعة حركة السكين
            const dx = mouse.x - mouse.prevX;
            const dy = mouse.y - mouse.prevY;
            mouse.speed = Math.hypot(dx, dy);
            
            if (mouse.speed > 1) {
                mouse.angle = Math.atan2(dy, dx);
            }

            // إضافة نقطة لأثر السيف
            mouse.trail.push({ x: mouse.x, y: mouse.y, alpha: 1 });
            if (mouse.trail.length > 12) {
                mouse.trail.shift();
            }
        });

        // قائمة الفواكه والقنابل والأنصاف المقطوعة والجزئيات (العصير)
        const fruits = [];
        const slicedHalves = [];
        const particles = [];
        const bombs = [];

        const fruitTypes = [
            { name: 'بطيخ', color: '#ef4444', innerColor: '#fca5a5', radius: 35 },
            { name: 'برتقال', color: '#f97316', innerColor: '#ffedd5', radius: 28 },
            { name: 'ليمون', color: '#eab308', innerColor: '#fef08a', radius: 25 },
            { name: 'كيوي', color: '#84cc16', innerColor: '#d9f99d', radius: 22 }
        ];

        // إنشاء فاكهة جديدة
        function spawnFruit() {
            const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
            const margin = 100;
            const x = margin + Math.random() * (canvas.width - margin * 2);
            
            fruits.push({
                x: x,
                y: canvas.height + 50,
                vx: (canvas.width / 2 - x) * 0.005 + (Math.random() - 0.5) * 3,
                vy: -(14 + Math.random() * 4),
                radius: type.radius,
                color: type.color,
                innerColor: type.innerColor,
                angle: Math.random() * Math.PI * 2,
                vAngle: (Math.random() - 0.5) * 0.05
            });
        }

        // إنشاء قنبلة
        function spawnBomb() {
            const margin = 100;
            const x = margin + Math.random() * (canvas.width - margin * 2);
            
            bombs.push({
                x: x,
                y: canvas.height + 50,
                vx: (canvas.width / 2 - x) * 0.005 + (Math.random() - 0.5) * 2,
                vy: -(13 + Math.random() * 3),
                radius: 25,
                angle: 0
            });
        }

        // إنشاء تأثير العصير عند القطع
        function createSplash(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    radius: 2 + Math.random() * 4,
                    color: color,
                    alpha: 1
                });
            }
        }

        // رسم السكين
        function drawKnife(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // المقبض (Wood/Dark Metal)
            ctx.fillStyle = '#334155';
            ctx.fillRect(-35, -4, 20, 8);

            // حارس السكين
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(-15, -7, 4, 14);

            // الشفرة الحادة (Shiny Blade)
            ctx.beginPath();
            ctx.moveTo(-11, -5);
            ctx.lineTo(25, 0); // رأس السكين
            ctx.lineTo(-11, 5);
            ctx.closePath();
            
            ctx.fillStyle = '#e2e8f0';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#38bdf8';
            ctx.fill();

            // لمعان الشفرة
            ctx.beginPath();
            ctx.moveTo(-11, -3);
            ctx.lineTo(15, 0);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.restore();
        }

        // رسم نصف فاكهة مقطوعة
        function drawHalfFruit(half) {
            ctx.save();
            ctx.translate(half.x, half.y);
            ctx.rotate(half.angle);

            ctx.beginPath();
            // رسم نصف دائرة معتمد على الاتجاه (يمين/شمال)
            ctx.arc(0, 0, half.radius, half.side === 'left' ? Math.PI / 2 : -Math.PI / 2, half.side === 'left' ? -Math.PI / 2 : Math.PI / 2);
            ctx.closePath();

            // القشرة الخارجية
            ctx.fillStyle = half.color;
            ctx.fill();

            // اللب الداخلي
            ctx.beginPath();
            ctx.arc(0, 0, half.radius * 0.8, half.side === 'left' ? Math.PI / 2 : -Math.PI / 2, half.side === 'left' ? -Math.PI / 2 : Math.PI / 2);
            ctx.fillStyle = half.innerColor;
            ctx.fill();

            ctx.restore();
        }

        // الحلقة الرئيسية للعبة
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. رسم أثر ضربة السكين (Blade Trail)
            for (let i = 1; i < mouse.trail.length; i++) {
                const p1 = mouse.trail[i - 1];
                const p2 = mouse.trail[i];

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = `rgba(56, 189, 248, ${p1.alpha})`;
                ctx.lineWidth = (i / mouse.trail.length) * 6;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#38bdf8';
                ctx.stroke();

                p1.alpha -= 0.08;
            }
            mouse.trail = mouse.trail.filter(p => p.alpha > 0);

            // 2. تحديث ورسم الفواكه المكتملة
            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                f.vy += 0.25; // الجاذبية
                f.x += f.vx;
                f.y += f.vy;
                f.angle += f.vAngle;

                // رسم الفاكهة
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.angle);
                
                ctx.beginPath();
                ctx.arc(0, 0, f.radius, 0, Math.PI * 2);
                ctx.fillStyle = f.color;
                ctx.fill();
                
                // تفاصيل القشرة
                ctx.beginPath();
                ctx.arc(0, 0, f.radius * 0.82, 0, Math.PI * 2);
                ctx.fillStyle = f.innerColor;
                ctx.fill();

                ctx.restore();

                // فحص التقاطع مع السكين (عند تحريك الماوس بسرعة)
                if (mouse.speed > 2) {
                    const dist = Math.hypot(mouse.x - f.x, mouse.y - f.y);
                    if (dist < f.radius + 10) {
                        // أكل/قطع الفاكهة!
                        score += 10;
                        scoreText.innerText = score;

                        createSplash(f.x, f.y, f.color);

                        // إنشاء النصف الأيسر
                        slicedHalves.push({
                            x: f.x - 5,
                            y: f.y,
                            vx: f.vx - 3,
                            vy: f.vy - 1,
                            radius: f.radius,
                            color: f.color,
                            innerColor: f.innerColor,
                            angle: f.angle,
                            vAngle: -0.1,
                            side: 'left'
                        });

                        // إنشاء النصف الأيمن
                        slicedHalves.push({
                            x: f.x + 5,
                            y: f.y,
                            vx: f.vx + 3,
                            vy: f.vy - 1,
                            radius: f.radius,
                            color: f.color,
                            innerColor: f.innerColor,
                            angle: f.angle,
                            vAngle: 0.1,
                            side: 'right'
                        });

                        fruits.splice(i, 1);
                        continue;
                    }
                }

                // حذف الفاكهة إن سقطت لأسفل
                if (f.y > canvas.height + 100) {
                    fruits.splice(i, 1);
                }
            }

            // 3. تحديث ورسم أنصاف الفواكه المقطوعة
            for (let i = slicedHalves.length - 1; i >= 0; i--) {
                const h = slicedHalves[i];
                h.vy += 0.3;
                h.x += h.vx;
                h.y += h.vy;
                h.angle += h.vAngle;

                drawHalfFruit(h);

                if (h.y > canvas.height + 100) {
                    slicedHalves.splice(i, 1);
                }
            }

            // 4. تحديث ورسم تأثيرات نقط العصير
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.alpha);
                ctx.fill();
                ctx.globalAlpha = 1;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // 5. تحديث ورسم القنابل
            for (let i = bombs.length - 1; i >= 0; i--) {
                const b = bombs[i];
                b.vy += 0.25;
                b.x += b.vx;
                b.y += b.vy;

                // رسم القنبلة
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 3;
                ctx.stroke();

                // رسم الفتيل المشتعل
                ctx.beginPath();
                ctx.arc(b.x, b.y - b.radius, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#f59e0b';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f59e0b';
                ctx.fill();
                ctx.shadowBlur = 0;

                // اصطدام القنبلة بالسكين
                if (mouse.speed > 2) {
                    const dist = Math.hypot(mouse.x - b.x, mouse.y - b.y);
                    if (dist < b.radius + 10) {
                        score = Math.max(0, score - 30);
                        scoreText.innerText = score;
                        createSplash(b.x, b.y, '#ef4444');
                        bombs.splice(i, 1);
                        continue;
                    }
                }

                if (b.y > canvas.height + 100) {
                    bombs.splice(i, 1);
                }
            }

            // 6. رسم السكين فوق كل العناصر في موقع الماوس
            drawKnife(mouse.x, mouse.y, mouse.angle);

            requestAnimationFrame(animate);
        }

        // توليد الفواكه والقنابل تلقائياً
        setInterval(() => {
            if (Math.random() < 0.75) {
                spawnFruit();
            } else {
                spawnBomb();
            }
        }, 800);

        animate();
    </script>
</body>
</html>
