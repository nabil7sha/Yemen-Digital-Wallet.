<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSB Wallet - تسجيل الدخول الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .glass-box {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-box rounded-3xl p-8 space-y-8 relative overflow-hidden transition-all duration-300 hover:border-blue-500/20">
        
        <!-- تأثير توهج خلفي ملون -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-600/20 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-emerald-600/20 rounded-full blur-3xl pointer-events-none"></div>

        <!-- الشعار والهوية -->
        <div class="text-center space-y-3 relative z-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-500 text-white shadow-lg shadow-blue-500/20 mb-2">
                <i class="fa-solid fa-shield-halved text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">بوابة الدخول الموحدة</h1>
            <p class="text-xs text-slate-400">سجل الدخول بأمان للوصول لمحفظتك الرقمية</p>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form onsubmit="handleLogin(event)" class="space-y-5 relative z-10">
            <div class="space-y-1.5">
                <label class="block text-xs font-bold text-slate-300">اسم المستخدم</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input id="input-username" type="text" required class="w-full pr-11 pl-4 py-3 bg-slate-950/50 rounded-xl border border-slate-800 text-xs font-semibold text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-slate-600" placeholder="مثال: nabil">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-bold text-slate-300">كلمة المرور المشفرة</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input id="input-password" type="password" required class="w-full pr-11 pl-4 py-3 bg-slate-950/50 rounded-xl border border-slate-800 text-xs font-semibold text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-slate-600" placeholder="••••••••">
                </div>
            </div>

            <!-- زر التأكيد البرمجي -->
            <button type="submit" id="btn-login-submit" class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl text-xs font-bold transition-all duration-300 shadow-lg shadow-blue-500/10 hover:scale-[1.01] flex items-center justify-center gap-2">
                <i id="submit-icon" class="fa-solid fa-arrow-right-to-bracket"></i> تسجيل الدخول والتوثيق الآمن
            </button>
        </form>

        <div class="text-center text-[10px] text-slate-500 relative z-10 border-t border-slate-800/60 pt-4">
            <p>محمية بالكامل بمعيار التشفير العالمي <span class="font-mono text-blue-500">JWT / SHA-256</span></p>
        </div>
    </div>

    <!-- حاوية التنبيهات المدمجة الذكية (Toasts) -->
    <div id="toast-container" class="fixed bottom-6 left-6 z-50 flex flex-col gap-3"></div>

    <script>

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-300' : 'bg-red-950/90 border-red-500/30 text-red-300';
            const icon = type === 'success' ? 'fa-circle-check text-emerald-400' : 'fa-triangle-exclamation text-red-400';

            toast.className = `flex items-center gap-3 p-4 rounded-xl border shadow-2xl backdrop-blur-xl transition-all duration-300 transform translate-y-6 opacity-0 ${bgClass}`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-base"></i><span class="text-xs font-bold">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-y-6', 'opacity-0'), 50);
            setTimeout(() => {
                toast.classList.add('translate-y-6', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('input-username').value.trim();
            const password = document.getElementById('input-password').value;
            const submitBtn = document.getElementById('btn-login-submit');
            const submitIcon = document.getElementById('submit-icon');

            // تفعيل حالة التحميل البصري
            submitBtn.disabled = true;
            submitIcon.className = "fa-solid fa-spinner fa-spin";

            try {
                // إرسال طلب التوثيق وتسجيل الدخول المزدوج للسيرفر
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast("تم التحقق من هويتك وتوليد تذكرة JWT بنجاح!", "success");
                    
                    // حفظ رموز الأمان في ذاكرة المتصفح المحلية
                    localStorage.setItem('nsb_access_token', data.access);
                    localStorage.setItem('nsb_refresh_token', data.refresh);
                    localStorage.setItem('nsb_username', data.username);

                    // التوجه إلى لوحة التحكم فوراً بعد ثانية واحدة
                    setTimeout(() => {
                        window.location.href = '/api/dashboard';
                    }, 1000);
                } else {
                    showToast(data.error || "فشل التوثيق! تحقق من البيانات مجدداً.", "error");
                    submitBtn.disabled = false;
                    submitIcon.className = "fa-solid fa-arrow-right-to-bracket";
                }
            } catch (err) {
                console.error(err);
                showToast("تعذر الاتصال بخادم الأمان. تأكد من تشغيل السيرفر.", "error");
                submitBtn.disabled = false;
                submitIcon.className = "fa-solid fa-arrow-right-to-bracket";
            }
        }
    </script>
</body>
</html>
